<!DOCTYPE html> 
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoC Avvera - Area Riservata</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e3f2fd; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; border: 2px solid #2196f3; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        .user-info { background: #f1f8ff; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 5px solid #2196f3; }
        .logout { background-color: #d32f2f; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        .logout:disabled { background-color: #999; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <span style="background: #2196f3; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold;">AREA RISERVATA</span>
        <h1>Benvenuto Cliente</h1>
        
        <div class="user-info">
            <strong>Codice Fiscale identificato:</strong> <br>
            <span id="cfDisplay" style="font-family: monospace; font-size: 18px; font-weight: bold;">---</span>
        </div>

        <p style="font-size: 14px; color: #555;">La nuova chat riceverà il tuo codice fiscale (variabile nascosta).</p>
        
        <button id="logoutBtn" class="logout" onclick="logout()">Logout</button>
    </div>

    <script>
        const userCF = localStorage.getItem('session_cf') || "SCONOSCIUTO";
        document.getElementById('cfDisplay').innerText = userCF;

        // Stessa funzione di pulizia profonda per il logout
        async function wipeSalesforceData() {
            try {
                if (window.embeddedservice_bootstrap && embeddedservice_bootstrap.utilAPI) {
                    embeddedservice_bootstrap.utilAPI.clearSession();
                }
            } catch(e) {}

            localStorage.clear();
            sessionStorage.clear();

            if (window.indexedDB && window.indexedDB.databases) {
                try {
                    const dbs = await window.indexedDB.databases();
                    dbs.forEach(db => window.indexedDB.deleteDatabase(db.name));
                } catch(e) {}
            }
        }

        async function logout() {
            const btn = document.getElementById('logoutBtn');
            btn.innerText = "Pulizia in corso...";
            btn.disabled = true;

            await wipeSalesforceData();
            window.location.href = 'index.html';
        }

        // Inizializzazione Agentforce
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'it'; 

                // Ascoltatore: Appena il widget è pronto per la nuova conversazione, passa il CF
                window.addEventListener("onEmbeddedMessagingReady", () => {
                    console.log("Agentforce pronto! Invio hidden pre-chat: codiceFiscale ->", userCF);
                    embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
                        "codiceFiscale": userCF
                    });
                });

                embeddedservice_bootstrap.init(
                    '00DMA000004YOm0',
                    'Avvera',
                    'https://ssg-ai--avveraai.sandbox.my.site.com/ESWAvvera1778503178330',
                    {
                        scrt2URL: 'https://ssg-ai--avveraai.sandbox.my.salesforce-scrt.com'
                    }
                );
            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };
    </script>
    <script type='text/javascript' src='https://ssg-ai--avveraai.sandbox.my.site.com/ESWAvvera1778503178330/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

</body>
</html>
